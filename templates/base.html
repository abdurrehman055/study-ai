<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}StudyAI{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="/static/css/main.css" rel="stylesheet">
  {% block head %}{% endblock %}
</head>
<body>

<!-- Global toast container -->
<div id="toast-container"></div>

<!-- Mobile overlay -->
<div class="sidebar-overlay" id="sidebar-overlay"></div>

<div class="app-shell">

  <!-- ── Sidebar ─────────────────────────────────── -->
  <nav class="sidebar" id="sidebar">

    <a href="/app/dashboard" class="sidebar-logo">
      <div class="logo-icon"><i class="bi bi-stars"></i></div>
      <span class="logo-text">Study<span>AI</span></span>
    </a>

    <div class="sidebar-nav">

      <!-- MAIN -->
      <div class="nav-section">
        <div class="nav-section-label">Main</div>
        <a href="/app/dashboard" class="nav-link">
          <i class="bi bi-grid-1x2-fill"></i> Dashboard
        </a>
        <a href="/app/plans" class="nav-link">
          <i class="bi bi-journal-bookmark-fill"></i> Study Plans
        </a>
        <a href="/app/status" class="nav-link">
          <i class="bi bi-activity"></i> Status
        </a>
      </div>

      <!-- TOOLS -->
      <div class="nav-section" style="margin-top:14px">
        <div class="nav-section-label">Tools</div>
        <a href="/docs" target="_blank" rel="noopener noreferrer" class="nav-link nav-link-ext">
          <span style="display:flex;align-items:center;gap:9px">
            <i class="bi bi-code-slash"></i> API Docs
          </span>
          <i class="bi bi-arrow-up-right ext-arrow"></i>
        </a>
      </div>

    </div>

    <!-- ACCOUNT -->
    <div class="sidebar-footer">
      <div class="nav-section-label" style="padding:0 10px 6px">Account</div>
      <div class="user-card">
        <div class="user-avatar" id="sidebar-user-init">?</div>
        <div style="min-width:0">
          <div class="user-name" id="sidebar-user-name">Loading…</div>
          <div class="user-email" id="sidebar-user-email"></div>
        </div>
      </div>
      <button class="btn-logout" id="btn-logout">
        <i class="bi bi-box-arrow-left"></i> Sign out
      </button>
    </div>

  </nav>

  <!-- ── Main content ─────────────────────────────── -->
  <div class="main-content">

    <!-- Mobile topbar -->
    <div class="topbar">
      <button class="btn-hamburger" id="btn-hamburger">
        <i class="bi bi-list"></i>
      </button>
      <div class="topbar-logo">
        <div class="logo-icon" style="width:24px;height:24px;font-size:11px">
          <i class="bi bi-stars"></i>
        </div>
        StudyAI
      </div>
      <div style="width:28px"></div>
    </div>

    <div class="page-body">
      {% block content %}{% endblock %}
    </div>
  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="/static/js/api.js"></script>
{% block scripts %}{% endblock %}
</body>
</html>
